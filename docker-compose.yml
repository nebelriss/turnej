version: "3.9"
services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: turnej
      POSTGRES_PASSWORD: turnej
      POSTGRES_DB: turnej
    ports:
      - 5432:5432
  pgadmin4:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: user@domain.com
      PGADMIN_DEFAULT_PASSWORD: SuperSecret
    ports:
      - 8060:80
